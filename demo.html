<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A* Algorithm Interactive Visualizer</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        .page-layout { display: flex; flex-direction: column; min-height: 100vh; }
        .main-content { display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 20px; flex-grow: 1; }
        .visualization-area { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .grid-container { border: 2px solid var(--secondary-color); border-radius: var(--border-radius); background: var(--white); box-shadow: var(--shadow); }
        #gridCanvas { display: block; cursor: crosshair; }
        .controls-panel { background: var(--white); padding: 20px; border-radius: var(--border-radius); box-shadow: var(--shadow); overflow-y: auto; }
        .btn { display: block; width: 100%; margin-bottom: 10px; padding: 10px; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .btn-primary { background-color: var(--primary-color); }
        .btn-secondary { background-color: var(--secondary-color); }
        .btn-danger { background-color: #e74c3c; }
        .stats { margin-top: 20px; padding: 10px; background: var(--bg-color); border-radius: 4px; }
        .stat-item { display: flex; justify-content: space-between; }
        .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; }
        .legend-color { width: 15px; height: 15px; border: 1px solid #ccc; border-radius: 2px; }
    </style>
</head>
<body class="page-layout">
    <nav class="nav-bar">
        <span>Mastering A*</span>
        <div>
            <a href="index.html">Home</a>
            <a href="demo.html">Visualizer</a>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="visualization-area">
            <div class="grid-container">
                <canvas id="gridCanvas" width="800" height="600"></canvas>
            </div>
        </div>
        
        <div class="controls-panel">
            <div class="control-section">
                <h3>Controls</h3>
                <button id="startBtn" class="btn btn-primary">Start A* Search</button>
                <button id="pauseBtn" class="btn btn-secondary" disabled>Pause</button>
                <button id="resetBtn" class="btn btn-danger">Reset Grid</button>
                <button id="clearPathBtn" class="btn btn-secondary">Clear Path Only</button>
                <button id="generateMazeBtn" class="btn btn-secondary">Generate Maze</button>
                
                <label>Heuristic:</label>
                <select id="heuristicSelect" style="width: 100%;">
                    <option value="manhattan">Manhattan</option>
                    <option value="euclidean">Euclidean</option>
                    <option value="diagonal">Diagonal</option>
                    <option value="dijkstra">Dijkstra</option>
                </select>
            </div>
            
            <div class="stats">
                <h4>Statistics</h4>
                <div class="stat-item"><span>Nodes Explored:</span><span id="nodesExplored">0</span></div>
                <div class="stat-item"><span>Path Length:</span><span id="pathLength">0</span></div>
                <div class="stat-item"><span>Status:</span><span id="algorithmStatus">Ready</span></div>
            </div>
            
            <div class="legend">
                <!-- Legend items... -->
            </div>
        </div>
    </div>
    
    <script src="visualization.js"></script>
</body>
</html>
