<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A* Algorithm Interactive Visualizer</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        .page-layout { display: flex; flex-direction: column; min-height: 100vh; }
        .main-content { display: flex; flex-direction: column; gap: 20px; padding: 10px; flex-grow: 1; }
        
        @media (min-width: 768px) {
            .main-content { flex-direction: row; padding: 20px; align-items: flex-start; }
            .visualization-area { width: auto; flex-grow: 1; }
            .controls-panel { width: 350px; flex-shrink: 0; }
        }

        .visualization-area { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .grid-container { border: 2px solid var(--secondary-color); border-radius: var(--border-radius); background: var(--white); box-shadow: var(--shadow); max-width: 100%; overflow: auto; }
        #gridCanvas { display: block; cursor: crosshair; touch-action: none; max-width: 100%; }
        .controls-panel { background: var(--white); padding: 15px; border-radius: var(--border-radius); box-shadow: var(--shadow); width: 100%; box-sizing: border-box; }
        .btn { display: block; width: 100%; margin-bottom: 10px; padding: 12px; cursor: pointer; border: none; border-radius: 4px; color: white; transition: background 0.3s; font-size: 1rem; }
        .btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .btn-primary { background-color: var(--primary-color); }
        .btn-secondary { background-color: var(--secondary-color); }
        .btn-danger { background-color: #e74c3c; }
        .stats { margin-top: 20px; padding: 10px; background: var(--bg-color); border-radius: 4px; }
        .stat-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem; }
        .control-section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        #stepDescription { font-size: 0.9rem; margin-top: 10px; color: var(--secondary-color); font-style: italic; text-align: center; }
    </style>
</head>
<body class="page-layout">
    <nav class="nav-bar">
        <span>Mastering A*</span>
        <div>
            <a href="index.html">Home</a>
            <a href="demo.html">Visualizer</a>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="visualization-area">
            <div class="grid-container">
                <canvas id="gridCanvas" width="800" height="600"></canvas>
            </div>
            <div id="stepDescription">Click on the grid to set start and end points.</div>
        </div>
        
        <div class="controls-panel">
            <div class="control-section">
                <h3>Algorithm Controls</h3>
                <button id="startBtn" class="btn btn-primary">Start Algorithm</button>
                <button id="pauseBtn" class="btn btn-danger" disabled>Stop / Pause</button>
                <button id="resetBtn" class="btn btn-secondary">Reset Grid</button>
                <button id="clearPathBtn" class="btn btn-secondary">Clear Path</button>
                <button id="generateMazeBtn" class="btn btn-secondary">Generate Random Maze</button>
            </div>
            
            <div class="control-section">
                <h3>Configuration</h3>
                <label for="heuristicSelect">Heuristic:</label>
                <select id="heuristicSelect" style="width: 100%; margin-bottom: 10px; padding: 5px;">
                    <option value="manhattan">Manhattan</option>
                    <option value="euclidean">Euclidean</option>
                    <option value="diagonal">Diagonal</option>
                    <option value="octile">Octile</option>
                    <option value="dijkstra">Dijkstra (No Heuristic)</option>
                </select>
                
                <label for="demoSelect">Demo Mode:</label>
                <select id="demoSelect" style="width: 100%; margin-bottom: 10px; padding: 5px;">
                    <option value="manual">Manual (Set Start/End)</option>
                    <option value="maze">Run on Generated Maze</option>
                </select>
                
                <label for="speedSlider">Animation Speed:</label>
                <input type="range" id="speedSlider" min="1" max="100" value="50" style="width: 100%;">
                <span id="speedValue">50ms</span>
            </div>
            
            <div class="stats">
                <h4>Statistics</h4>
                <div class="stat-item"><span>Status:</span><span id="algorithmStatus">Ready</span></div>
                <div class="stat-item"><span>Nodes Explored:</span><span id="nodesExplored">0</span></div>
                <div class="stat-item"><span>Path Length:</span><span id="pathLength">0</span></div>
                <div class="stat-item"><span>Execution Time:</span><span id="executionTime">0ms</span></div>
            </div>
        </div>
    </div>
    
    <script src="visualization.js"></script>
</body>
</html>
